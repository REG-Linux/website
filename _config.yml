title: REG Linux
description: Retro Emulation Gaming Linux community builds for SBCs, handhelds, and mini PCs.
baseurl: ""
url: "https://reglinux.org"
og_image: "/assets/images/reg_linux_logo.png"
markdown: kramdown
include:
  - .well-known
exclude:
  - download-source.html
  - compat/
  - wiki/
  - CLAUDE.md
  - scripts/
  - codex
  - README.md
  - WIKI_MIGRATION_PLAN.md
  - WIKI_ASSET_FETCH_REPORT.md
collections:
  devices:
    output: true
    permalink: /download/:name/
plugins:
  - jekyll-sitemap
  - jekyll-feed