title: REG Linux
description: Free retrogaming OS for 186+ devices. Emulators pre-configured for handhelds, SBCs, and PCs. Open source Batocera alternative with RISC-V support.
baseurl: ""
url: "https://reglinux.org"
og_image: "/assets/images/reg_linux_logo.png"
markdown: kramdown
include:
  - .well-known
exclude:
  - download-source.html
  - compat/
  - wiki/
  - CLAUDE.md
  - scripts/
  - codex
  - reglinux/
  - README.md
  - WIKI_MIGRATION_PLAN.md
  - WIKI_ASSET_FETCH_REPORT.md
collections:
  devices:
    output: true
    permalink: /download/:name/
plugins:
  - jekyll-sitemap
  - jekyll-feed