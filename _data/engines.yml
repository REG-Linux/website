# Engine showcase
- name: ScummVM
  description: >
    Play Monkey Island, Day of the Tentacle, Grim Fandango, Broken Sword, and hundreds of other point-and-click adventures.
  url: https://reglinux.org/wiki/engines/scummvm/
  cta_label: ScummVM guide
  logos:
    - src: /assets/images/engines/scummvm.svg
      alt: ScummVM logo
- name: Solarus
  description: >
    Zelda-style top-down action-adventure engine. Play fan-made quests with full controller support.
  url: https://reglinux.org/wiki/engines/solarus/
  cta_label: Solarus guide
  logos:
    - src: /assets/images/engines/solarus.svg
      alt: Solarus logo
- name: EasyRPG
  description: >
    Play RPG Maker 2000/2003 games natively. Drop your game folder in and go.
  url: https://reglinux.org/wiki/engines/easyrpg/
  cta_label: EasyRPG guide
  logos:
    - src: /assets/images/engines/easyrpg.svg
      alt: EasyRPG logo
- name: IKEMEN
  description: >
    Open-source fighting game engine based on M.U.G.E.N. Rollback netcode, community-made fighters.
  url: https://reglinux.org/wiki/engines/ikemen/
  cta_label: IKEMEN guide
  logos:
    - src: /assets/images/engines/ikemen.svg
      alt: IKEMEN logo
- name: OpenBOR
  description: >
    Beat 'em up engine. Streets of Rage-style games, community-made and original.
  url: https://reglinux.org/wiki/engines/openbor/
  cta_label: OpenBOR guide
  logos:
    - src: /assets/images/engines/openbor.svg
      alt: OpenBOR logo
- name: Flash Player
  description: >
    Play Flash games via Ruffle and Lightspark. No Adobe needed.
  url: https://reglinux.org/wiki/engines/flash/
  cta_label: Flash guide
  logos:
    - src: /assets/images/engines/ruffle.svg
      alt: Ruffle logo
    - src: /assets/images/engines/lightspark.svg
      alt: Lightspark logo
- name: TheXTech
  description: >
    Play Super Mario Bros. X levels and worlds with widescreen support.
  url: https://reglinux.org/wiki/engines/thextech/
  cta_label: TheXTech guide
  logos:
    - src: /assets/images/engines/thextech.png
      alt: TheXTech logo
- name: Singe
  description: >
    LaserDisc FMV games — Mad Dog McCree, Dragon's Lair, Crime Patrol, Space Pirates.
  url: https://reglinux.org/wiki/engines/singe/
  cta_label: Singe guide
  logos:
    - src: /assets/images/engines/singe.svg
      alt: Singe logo
