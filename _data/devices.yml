asus-rog-ally:
  title: Asus ROG Ally
  brand: ASUS
  manufacturer:
  - ASUS
  soc:
  - AMD Ryzen Z1
  image: /assets/images/asus-rog-ally.webp
  image_width: 220
  image_height: 91
  board_url: https://reglinux.org/wiki/handhelds/x86_64/asus-rog-ally/
  description: REG Linux for Asus ROG Ally (AMD Ryzen Z1).
  lede: Asus ROG Ally — PC powered by AMD Ryzen Z1.
  install_notes: '## Installation notes


    1. Grab the image. Download the latest Asus ROG Ally build from the downloads page or the official board entry .


    2. Flash to storage. Use balenaEtcher, Raspberry Pi Imager, or `dd` to write the image to an SD card or SSD. Make sure
    to verify the checksum before booting.


    3. First boot setup. Insert the media into your Asus ROG Ally, power on, and let REG Linux expand the filesystem. Pair
    controllers inside EmulationStation once prompted.


    4. Troubleshoot with rescue tools. REG Linux ships with an immutable base and rescue partition—if something breaks, reboot
    into rescue or reflash without touching your ROMs.'
