hardkernel-odroid-go-ultra:
  title: HardKernel ODROID GO Ultra
  brand: HardKernel
  manufacturer:
  - HardKernel
  soc:
  - Amlogic S922X
  image: /assets/images/hardkernel-odroid-go-ultra.webp
  image_width: 220
  image_height: 91
  board_url: https://reglinux.org/wiki/handhelds/hardkernel/odroid-go-ultra/
  description: REG Linux for HardKernel ODROID GO Ultra (Amlogic S922X).
  lede: HardKernel ODROID GO Ultra — handheld powered by Amlogic S922X.
  install_notes: '## Install REG Linux


    ### Installation


    First download the latest S922X version of REG Linux from the button below.


    To install REG Linux to the eMMC, you need to boot the device into recovery mode. There are 2 ways to do this:


    - Hardkernel Recovery SD Download this recovery image . Follow the recovery steps on the Odroid wiki . [this recovery
    image](https://wiki.odroid.com/odroid_go_ultra/os_image/recovery) [the Odroid wiki](https://wiki.odroid.com/odroid_go_ultra/getting_started/recovery_eMMC)

    - REG Linux Recovery hold Volume Down while the device boots.


    Once booted into recovery mode and connected to a PC via USB-C, the REG Linux image may be flashed to the eMMC using Balena
    Etcher, win32diskimager, dd or similar.


    Once the REG Linux image has been flashed to the the eMMC, restart the device and REG Linux will go through its first
    boot process (running from eMMC).'
