gameforce-chi:
  title: Gameforce CHI
  brand: Gameforce
  manufacturer:
  - Gameforce
  soc:
  - Rockchip RK3326
  image: /assets/images/gameforce-chi.webp
  image_width: 220
  image_height: 123
  board_url: https://reglinux.org/wiki/sbcs/gameforce-chi/
  description: REG Linux for Gameforce CHI (Rockchip RK3326).
  lede: Gameforce CHI — handheld powered by Rockchip RK3326.
  install_notes: '## Installation notes


    1. Grab the image. Download the latest Gameforce CHI build from the downloads page or the official board entry .


    2. Flash to storage. Use balenaEtcher, Raspberry Pi Imager, or `dd` to write the image to an SD card or SSD. Make sure
    to verify the checksum before booting.


    3. First boot setup. Insert the media into your Gameforce CHI, power on, and let REG Linux expand the filesystem. Pair
    controllers inside EmulationStation once prompted.


    4. Troubleshoot with rescue tools. REG Linux ships with an immutable base and rescue partition—if something breaks, reboot
    into rescue or reflash without touching your ROMs.'
