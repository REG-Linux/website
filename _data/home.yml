hardware_cards:
- title: Single-board computers
  body: Raspberry Pi, Orange Pi, Radxa, Khadas, and more. Plug in, boot, play.
- title: Handhelds & mini consoles
  body: Anbernic, Powkiddy, Retroid, AYN, AYANEO. Controls and suspend work out of the box.
- title: Laptops & desktops
  body: x86_64 builds for Steam Deck, ROG Ally, or any PC. Boot from USB or install to disk.
getting_started_steps:
- title: Download your image.
  body: Pick your device on the download page and grab the latest build.
- title: Flash to SD card or SSD.
  body: Use balenaEtcher, Raspberry Pi Imager, or dd. Takes about two minutes.
- title: Boot and set up.
  body: Power on, wait for first-boot setup, pair your controllers.
- title: Add your games.
  body: Copy ROMs via network share, USB, or the built-in file manager.
