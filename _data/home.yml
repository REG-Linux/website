features:
- title: REG-Station frontend
  description: A custom frontend built on top of EmulationStation. Browse your library, configure controllers, and tweak settings without touching a terminal.
- title: Pre-configured emulators
  description: RetroArch, MAME, Dolphin, PCSX2, and 50+ systems work out of the box with sensible defaults for controls, video, and audio.
- title: Immutable and recoverable
  description: The root filesystem is read-only. If something goes wrong, the built-in rescue mode gets you back in seconds. Your games are always safe.
- title: Native ports and engines
  description: Doom, Quake, Cave Story, ScummVM, and 40+ more games run natively — no emulation overhead.
- title: 186 supported devices
  description: Raspberry Pi, Anbernic handhelds, Rockchip SBCs, Steam Deck, ASUS ROG Ally, and everything in between. One image per device, flash and boot.
stack:
  highlights:
  - RetroArch with curated core presets per system
  - MAME for arcade accuracy
