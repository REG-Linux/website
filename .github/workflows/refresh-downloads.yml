name: Refresh Downloads
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - run: pip install pyyaml requests

      - name: Generate download links
        run: python3 compat/scripts/generate_download_links.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          git diff --quiet _data/download_links.yml || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _data/download_links.yml
            git commit -m "chore: refresh download links from GitHub releases"
            git push
          }
