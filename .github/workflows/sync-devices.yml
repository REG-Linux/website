name: Sync Devices
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout REG-Linux
        uses: actions/checkout@v4
        with:
          repository: REG-Linux/REG-Linux
          path: reglinux
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - run: pip install pyyaml

      - name: Run sync_devices.py
        run: python3 compat/scripts/sync_devices.py
        env:
          REG_LINUX_PATH: ${{ github.workspace }}/reglinux

      - name: Commit if changed
        run: |
          git diff --quiet _data/devices.yml _data/socs.yml || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add _data/devices.yml _data/socs.yml
            git commit -m "chore: sync devices from REG-Linux repo"
            git push
          }
