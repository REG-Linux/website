name: Deploy compat.reglinux.org
on:
  push:
    branches: [main]
    paths: ['compat/**', '_data/devices.yml', '_data/socs.yml', '.github/workflows/compat-deploy.yml']
  workflow_dispatch:

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
        working-directory: compat/worker
      - run: npx wrangler deploy
        working-directory: compat/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

  deploy-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: pip install pyyaml

      # Generate fresh data for the build
      - run: python3 compat/scripts/extract_devices.py
      - run: cp compat/scripts/devices_canonical.json compat/dashboard/src/data/devices.json

      # Build widget and copy to dashboard public
      - name: Build widget
        working-directory: compat/widget
        run: npm ci && npm run build
      - run: cp compat/widget/dist/widget.js compat/dashboard/public/widget.js

      # Build and deploy dashboard
      - name: Build dashboard
        working-directory: compat/dashboard
        run: npm ci && npm run build
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: reg-compat
          directory: compat/dashboard/dist

  generate-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: pip install pyyaml

      - run: python3 compat/scripts/extract_devices.py
      - run: python3 compat/scripts/generate_wiki.py

      - name: Build widget
        working-directory: compat/widget
        run: npm ci && npm run build
      - run: cp compat/widget/dist/widget.js wiki/docs/assets/widget.js

      - name: Commit wiki updates
        run: |
          git diff --quiet wiki/docs/ || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add wiki/docs/
            git commit -m "chore: regenerate wiki pages"
            git push
          }
