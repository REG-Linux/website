name = "reg-compat"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "reg-compat"
database_id = "eb5b4bf2-5ec0-472b-a405-b8b6aecbfb4f"

[vars]
GITHUB_CLIENT_ID = "Ov23liZEsqSwNEMVeZSV"
GITHUB_REDIRECT_URI = "https://compat.reglinux.org/api/auth/callback"
CORS_ORIGIN = "https://compat.reglinux.org"

# Daily cleanup: purge stale tokens and revoked data
[triggers]
crons = ["0 3 * * *"]  # 3:00 AM UTC daily

# Worker route for API under the Pages custom domain
[[routes]]
pattern = "compat.reglinux.org/api/*"
zone_name = "reglinux.org"

# Secrets (set via wrangler secret put):
# GITHUB_CLIENT_SECRET
# JWT_SECRET
# DEV_TOKENS — comma-separated list of pre-approved device tokens
#   These bypass registration rate limits and per-device caps.
#   Generate with: openssl rand -hex 32
#   Set with: wrangler secret put DEV_TOKENS
#   On device: echo "<token>" > /userdata/system/.compat-token
